<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress OUT · 운영자 — 신청 현황</title>
<!-- 엑셀(.xlsx) 내보내기용 SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Gowun+Batang:wght@400;700&display=swap');

  :root{
    --bg:#E3F3FB; --paper:#FFFFFF; --card:#F2FBFE;
    --ink:#1F4D5C; --ink-strong:#143945; --muted:#5E8A98; --faint:#9CC3CF;
    --line:#DCEEF4; --line2:#E8F5F9;
    --sea:#1AA7D6; --sea-deep:#0E83B5; --aqua:#46C9E8;
    --coral:#FF6B3D; --coral-deep:#E8552A; --melon:#3FB56A; --melon-pink:#F2557A; --sun:#FFC53D;
    --grad:linear-gradient(135deg,#46C9E8 0%,#1AA7D6 100%);
    --grad-btn:linear-gradient(100deg,#FF8A4D 0%,#FF6B3D 55%,#F2557A 100%);
    --grad-sea:linear-gradient(100deg,#46C9E8 0%,#1AA7D6 60%,#0E83B5 100%);
    --grad-soft:linear-gradient(135deg,#CFEFF8 0%,#D7F0E4 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0;word-break:keep-all !important;overflow-wrap:break-word !important;word-wrap:break-word !important;line-break:strict;}
  html,body{height:100%;}
  body{font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;
    background:radial-gradient(120% 80% at 50% 0%, #CDEEFA 0%, #B6E3F5 50%, #A6DAEF 100%);
    color:var(--ink); -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:22px 12px 40px; line-height:1.6;}
  .serif{font-family:'Gowun Batang',serif;}
  .fred{font-family:'Fredoka',sans-serif;}

  .device{width:100%; max-width:412px;
    background:linear-gradient(180deg,#F4FCFF 0%,#E8F6FC 100%);
    border-radius:34px; overflow:hidden; border:1px solid #CFE9F2;
    box-shadow:0 34px 80px -26px rgba(26,110,150,.45), 0 2px 0 rgba(255,255,255,.8) inset;
    position:relative; display:flex; flex-direction:column;
    height:min(880px, calc(100vh - 110px)); min-height:560px;}
  .screen,.admin{display:none; flex-direction:column; flex:1; min-height:0;}
  .screen.active,.admin.active{display:flex; overflow-y:auto; -webkit-overflow-scrolling:touch;
    animation:rise .5s cubic-bezier(.2,.7,.3,1);}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
  @media (max-width:480px){ body{padding:14px 8px 30px;} .device{height:auto; min-height:calc(100vh - 44px); overflow:visible;} .screen.active,.admin.active{overflow:visible;} }
  @media (min-width:768px){ body{padding:30px 16px 50px;} .device{max-width:760px; height:min(900px, calc(100vh - 90px));}
    .trow{font-size:20px;} .trow .who .nm{font-size:20.6px;} .kpi .kv{font-size:42.5px;} }
  @media (min-width:1024px){ body{padding:40px 24px 60px;} .device{max-width:920px;}
    .trow{font-size:21.2px;} .hbar{font-size:20px;} .tbtn,.fbtn{font-size:20px;} }

  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,textarea{font-family:inherit;}
  .sky{position:absolute; inset:0; pointer-events:none; overflow:hidden;}
  .sky .sp{position:absolute; opacity:.6; font-size:20.6px; animation:tw 4.5s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.3;transform:translateY(0) scale(.85)}50%{opacity:.9;transform:translateY(-6px) scale(1.1)}}

  .cta{width:100%; padding:16px; border-radius:50px; background:var(--grad-sea); color:#fff; font-size:28px; font-weight:700;
    box-shadow:0 14px 30px -10px rgba(26,167,214,.55); transition:transform .15s, box-shadow .2s;
    display:flex; align-items:center; justify-content:center; gap:9px;}
  .cta:hover{transform:translateY(-2px);}
  .cta:active{transform:scale(.99);}

  /* ===== LOGIN ===== */
  .login{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 30px; text-align:center;}
  .login .lock{width:66px; height:66px; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:50.1px;
    background:linear-gradient(135deg,#DCF0E5,#CFEAF4); border:1px solid var(--line); margin-bottom:20px;}
  .login h2{font-family:'Gowun Batang',serif; font-size:39.9px; color:var(--sea-deep);}
  .login .lsub{font-size:22.8px; color:var(--muted); margin-top:7px; margin-bottom:26px; line-height:1.6;}
  .login .lfield{width:100%; text-align:left; margin-bottom:14px;}
  .login .lfield label{display:block; font-size:22.1px; font-weight:600; color:var(--ink-strong); margin-bottom:7px;}
  .inp{width:100%; padding:14px 16px; border-radius:14px; border:1.5px solid var(--line); background:var(--paper);
    font-size:25.1px; color:var(--ink-strong); outline:none; transition:border .2s, box-shadow .2s;}
  .inp:focus{border-color:var(--sea); box-shadow:0 0 0 4px rgba(26,167,214,.12);}
  .pw-wrap{position:relative;}
  .pw-toggle{position:absolute; right:8px; top:50%; transform:translateY(-50%); width:36px; height:36px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; color:var(--faint);}
  .pw-toggle svg{width:21px; height:21px;}
  .lerr{font-size:21.2px; color:var(--coral-deep); margin:2px 0 14px; min-height:16px; font-weight:600; width:100%; text-align:left;}
  .demo-cred{font-size:20px; color:var(--faint); margin-top:16px; line-height:1.6; background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:10px 14px; width:100%;}
  .demo-cred b{color:var(--sea-deep);}

  /* ===== ADMIN ===== */
  .adm-banner{font-size:20.6px; color:#9A7B3A; background:#FBF1D6; border:1px solid #F0E0B0;
    padding:10px 14px; border-radius:12px; margin:14px 14px 0; display:flex; align-items:center; gap:7px; line-height:1.5;}
  .adm-head{display:flex; align-items:center; gap:11px; padding:16px 16px 12px; flex-wrap:wrap;}
  .adm-head .head-title{display:flex; align-items:center; gap:11px;}
  .adm-head .ava{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:29.5px;
    background:linear-gradient(135deg,#FF8A4D,#FF6B3D);}
  .adm-head .ah{font-family:'Gowun Batang',serif; font-size:28px; font-weight:700; color:var(--ink-strong);}
  .adm-head .as{font-size:19.8px; color:var(--faint); margin-top:1px;}
  .adm-head .tools{margin-left:auto; display:flex; gap:7px; flex-wrap:wrap;}
  .tbtn{font-size:20.6px; padding:8px 13px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--muted); font-weight:600;}
  .tbtn:hover{border-color:var(--sea); color:var(--sea-deep);}
  .tbtn.pri{background:var(--grad-btn); color:#fff; border-color:transparent; box-shadow:0 6px 14px -6px rgba(255,107,61,.5);}
  .adm-logout{font-size:20.6px; padding:8px 13px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--muted); font-weight:600;}
  .adm-body{padding:4px 14px 24px;}

  .kpis{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px;}
  @media(min-width:768px){.kpis{grid-template-columns:repeat(4,1fr);}}
  .kpi{background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px 16px;}
  .kpi .kl{font-size:19.8px; color:var(--muted); margin-bottom:5px;}
  .kpi .kv{font-family:'Fredoka',sans-serif; font-size:44.2px; color:var(--ink-strong); font-weight:700;}
  .kpi .kv small{font-size:22.1px; color:var(--muted); font-weight:400; margin-left:2px;}
  .kpi.accent .kv{color:var(--coral);}
  .kpi.sea .kv{color:var(--sea-deep);}

  .panel{background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px;}
  .panel .ph{font-size:23.6px; font-weight:700; color:var(--ink-strong); margin-bottom:14px;}
  .hbars{display:flex; flex-direction:column; gap:10px;}
  .hbar{display:flex; align-items:center; gap:10px; font-size:20.6px;}
  .hbar .hl{width:78px; color:var(--muted); flex-shrink:0; text-align:right;}
  .hbar .htrack{flex:1; height:14px; background:#E3F1F6; border-radius:8px; overflow:hidden;}
  .hbar .hfill{height:100%; border-radius:8px; background:linear-gradient(90deg,#46C9E8,#1AA7D6);}
  .hbar .hv{width:24px; color:var(--ink-strong); font-weight:600; flex-shrink:0;}
  .empty-msg{font-size:20.6px; color:var(--faint); text-align:center; padding:18px 0;}

  .filters{display:flex; gap:7px; margin-bottom:12px;}
  .fbtn{font-size:21.5px; padding:7px 15px; border-radius:50px; border:1px solid var(--line); background:#fff; color:var(--muted); font-weight:600;}
  .fbtn.on{background:var(--grad-soft); color:var(--sea-deep); border-color:transparent;}

  .tbl{background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden;}
  .trow{display:grid; grid-template-columns:1.25fr 1.15fr 0.95fr 0.45fr 0.7fr; gap:7px; align-items:center;
    padding:13px 14px; border-bottom:1px solid var(--line2); font-size:21.5px;}
  .trow:last-child{border-bottom:none;}
  .trow.thd{background:#F2FBFE; font-size:18px; color:var(--faint); letter-spacing:.2px;}
  .trow .who{display:flex; align-items:center; gap:8px; min-width:0;}
  .trow .who .av{width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:19.1px; color:#fff; font-weight:700; flex-shrink:0;}
  .trow .who .nm{font-weight:600; color:var(--ink-strong); font-size:21px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .trow .tel{color:var(--sea-deep); font-size:17px; white-space:nowrap;}
  .trow .topic{display:inline-flex; font-size:17px; color:var(--coral-deep); background:#FFEFE4; border:1px solid #FFD4BC;
    padding:3px 9px; border-radius:14px; font-weight:600; width:fit-content; line-height:1.35;}
  .trow .agree{text-align:center; color:var(--melon); font-weight:700;}
  .trow .agree.no{color:var(--faint);}
  .tag{font-size:18.9px; padding:4px 10px; border-radius:50px; font-weight:600; text-align:center; justify-self:end;}
  .tag.win{background:#E2F3E9; color:#2E9A57;}
  .tag.wait{background:#FBF1D6; color:#C19A4A;}
  .msgrow{grid-column:1 / -1; font-size:20px; color:var(--muted); background:#F7FCFE; border-radius:10px;
    padding:8px 11px; margin-top:2px; line-height:1.6; border:1px dashed var(--line);}
  .msgrow b{color:var(--ink); font-weight:600;}
  .timerow{grid-column:1 / -1; font-size:18.5px; color:var(--sea-deep); margin-top:6px; font-weight:600;}
  .schedrow{grid-column:1 / -1; font-size:18.5px; color:var(--coral-deep); margin-top:8px; font-weight:600; line-height:1.6;}
  .empty-row{padding:30px 16px; text-align:center; color:var(--faint); font-size:21.2px; line-height:1.7;}

  #toast{position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink-strong); color:#fff; padding:12px 22px; border-radius:50px; font-size:22.8px;
    opacity:0; transition:all .3s; pointer-events:none; z-index:99; box-shadow:0 12px 30px -8px rgba(20,57,69,.5);}
</style>
</head>
<body>
<div class="device" id="device">
  <div class="sky" id="sky1"></div>

  <!-- ============ ADMIN LOGIN ============ -->
  <section class="screen active" data-screen="adminlogin">
    <div class="login">
      <div class="lock">🔒</div>
      <h2 class="serif">운영자 로그인</h2>

  <!-- ============ ADMIN DASHBOARD ============ -->
  <section class="admin" data-screen="admin">
    <div class="adm-banner">🔒 운영자 전용 화면 — 로그인한 관리자만 접근할 수 있어요.</div>
    <div class="adm-head">
      <div class="head-title">
        <span class="ava">🎟</span>
        <div>
          <div class="ah serif">Stress OUT · 초대권 신청 현황</div>
          <div class="as" id="admSub">실시간 동기화 중</div>
        </div>
      </div>
      <div class="tools">
        <button class="tbtn" onclick="refreshAdmin()">새로고침</button>
        <button class="tbtn" onclick="exportExcel()">📊 엑셀 내보내기</button>
        <button class="tbtn pri" onclick="runDraw()">추첨 실행</button>
        <button class="adm-logout" onclick="adminLogout()">로그아웃</button>
      </div>
    </div>
    <div class="adm-body">
      <div class="kpis">
        <div class="kpi"><div class="kl">총 신청자</div><div class="kv"><span id="kpiTotal">0</span><small>명</small></div></div>
        <div class="kpi accent"><div class="kl">당첨 정원</div><div class="kv"><span id="kpiWin">0</span><small>명</small></div></div>
        <div class="kpi sea"><div class="kl">경쟁률</div><div class="kv"><span id="kpiRate">–</span><small>:1</small></div></div>
        <div class="kpi"><div class="kl">남긴 말씀</div><div class="kv"><span id="kpiMsg">0</span><small>건</small></div></div>
      </div>
      <div class="panel">
        <div class="ph">해소하고 싶은 스트레스 유형</div>
        <div class="hbars" id="admTopic"></div>
      </div>

        <button class="fbtn on" onclick="filterAdm('all',this)">전체</button>
        <button class="fbtn" onclick="filterAdm('win',this)">당첨</button>
        <button class="fbtn" onclick="filterAdm('wait',this)">대기</button>
      </div>
      <div class="tbl" id="admTbl"></div>
    </div>
  </section>

</div>

<div id="toast"></div>

<!-- ===== Firebase (Firestore) 실시간 구독 ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc }
    from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAACxVeu09DOfqx0RTe0ZK3mXI19-s-vw",
    authDomain: "stressout-36140.firebaseapp.com",
    projectId: "stressout-36140",
    storageBucket: "stressout-36140.firebasestorage.app",
    messagingSenderId: "478640335070",
    appId: "1:478640335070:web:98eaf5af8f519e6561ba4f",
    measurementId: "G-28Z8XEVFNZ"
  };
  try{
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.fbSubscribeApplicants = function(){
      const q = query(collection(db,'stress_applicants'), orderBy('createdAt','desc'));
      onSnapshot(q, (snap)=>{
        const list=[];
        snap.forEach(d=>{ const v=d.data();
          let atText = v.appliedAtText || '';
          if(!atText && v.createdAt && typeof v.createdAt.toDate==='function'){ try{ atText = fmtKDateTime(v.createdAt.toDate()); }catch(e){} }
          list.push({
            id:d.id, name:v.name||'', tel:v.tel||'', topic:v.topic||'', message:v.message||'',
            datesText: v.datesText||(Array.isArray(v.dates)?v.dates.join(', '):''),
            timesText: v.timesText||(Array.isArray(v.times)?v.times.join(', '):''),
            agree:v.agree?1:0, status:v.status||'wait', at:v.appliedAt||'', atText: atText }); });
        window.fbApplicants = list;
        if(typeof window.onApplicantsUpdate==='function') window.onApplicantsUpdate(list);
      }, (err)=>{ console.warn('Firestore 구독 실패 — localStorage로 대체', err); window.fbReady=false; if(typeof window.onApplicantsUpdate==='function') window.onApplicantsUpdate(null); });
    };
    window.fbUpdateStatus = async function(id, status){
      try{ await updateDoc(doc(db,'stress_applicants',id), {status}); }catch(e){ console.warn('상태 업데이트 실패', e); }
    };
    window.fbReady = true;
  }catch(e){
    console.warn('Firebase 초기화 실패 — localStorage로 대체합니다.', e);
    window.fbReady = false;
  }
</script>

<script>
/* ---------- floaties ---------- */
(function(){
  const sky=document.getElementById('sky1'); if(!sky) return;
  const marks=['☀','🌊','✦','🫧','·','🛟'];
  for(let i=0;i<12;i++){
    const s=document.createElement('span'); s.className='sp';
    s.textContent=marks[i%marks.length];
    s.style.left=(Math.random()*90+4)+'%'; s.style.top=(Math.random()*86+4)+'%';
    s.style.fontSize=(9+Math.random()*8)+'px'; s.style.animationDelay=(Math.random()*4.5)+'s';
    sky.appendChild(s);
  }
})();

/* ---------- navigation ---------- */
const device=document.getElementById('device');
function go(name){
  if(name==='admin' && !isAdminAuthed) name='adminlogin';
  document.querySelectorAll('.screen,.admin').forEach(s=>s.classList.toggle('active', s.dataset.screen===name));
  if(name==='admin') renderAdmin();
  const active=document.querySelector('.screen.active,.admin.active');
  if(active) active.scrollTop=0;
  device.scrollTop=0; window.scrollTo({top:0,behavior:'smooth'});
}

/* ---------- admin auth ---------- */
const ADMIN_ID='admin';
const ADMIN_PW='베드로';
let isAdminAuthed=false;
const EYE_OPEN='<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
const EYE_OFF='<path d="M2 12s3.5-7 10-7c2 0 3.8.6 5.3 1.5M22 12s-3.5 7-10 7c-2 0-3.8-.6-5.3-1.5"/><path d="M9.5 9.5a3 3 0 0 0 4.2 4.2"/><line x1="3" y1="3" x2="21" y2="21"/>';
function togglePw(){
  const inp=document.getElementById('adm-pw'), eye=document.getElementById('pwEye'), btn=document.getElementById('pwToggle');
  if(inp.type==='password'){ inp.type='text'; eye.innerHTML=EYE_OFF; btn.setAttribute('aria-label','비밀번호 숨기기'); }
  else{ inp.type='password'; eye.innerHTML=EYE_OPEN; btn.setAttribute('aria-label','비밀번호 보기'); }
}
function adminLogin(){
  const id=(document.getElementById('adm-id').value||'').trim();
  const pw=(document.getElementById('adm-pw').value||'').trim().normalize('NFC');
  const err=document.getElementById('adm-err');
  if(!id || !pw){ err.textContent='아이디와 비밀번호를 입력해 주세요.'; return; }
  if(id===ADMIN_ID && pw===ADMIN_PW.normalize('NFC')){
    isAdminAuthed=true; err.textContent='';
    document.getElementById('adm-pw').value='';
    if(window.fbReady && window.fbSubscribeApplicants) window.fbSubscribeApplicants();
    go('admin');
  }else{
    err.textContent='아이디 또는 비밀번호가 올바르지 않아요.';
    document.getElementById('adm-pw').value='';
  }
}
function adminLogout(){
  isAdminAuthed=false;
  document.getElementById('adm-id').value=''; document.getElementById('adm-pw').value='';
  document.getElementById('adm-err').textContent='';
  toast('로그아웃됐어요'); go('adminlogin');
}

/* ---------- data ---------- */
const APPLY_STORE_KEY='stress_out_applicants_v1';
const AV_COLORS=['#1AA7D6','#46C9E8','#FF6B3D','#F2557A','#3FB56A','#FFC53D','#0E83B5'];
let applicants=[], rawApplicants=[], admFilter='all', usingFirebase=false;

function rawList(){
  if(window.fbReady && Array.isArray(window.fbApplicants)){ usingFirebase=true; return window.fbApplicants; }
  usingFirebase=false;
  let stored=[];
  try{ const raw=localStorage.getItem(APPLY_STORE_KEY); if(raw) stored=JSON.parse(raw)||[]; }catch(e){ stored=[]; }
  return stored;
}
function maskTel(t){
  const d=(t||'').replace(/[^0-9]/g,'');
  if(d.length>=10){ return `${d.slice(0,3)}-${d.slice(3,d.length-4)}-****`; }
  return t||'-';
}
/* 한국어 날짜·시간: 2026년 6월 23일 (화) 오후 2:35 */
function fmtKDateTime(d){
  try{
    const days=['일','월','화','수','목','금','토'];
    const y=d.getFullYear(), mo=d.getMonth()+1, da=d.getDate(), w=days[d.getDay()];
    let h=d.getHours(); const mi=String(d.getMinutes()).padStart(2,'0');
    const ap=h<12?'오전':'오후'; let hh=h%12; if(hh===0) hh=12;
    return `${y}년 ${mo}월 ${da}일 (${w}) ${ap} ${hh}:${mi}`;
  }catch(e){ return ''; }
}
window.fmtKDateTime=fmtKDateTime;
function atTextOf(r){
  if(r.atText) return r.atText;
  if(r.at){ const d=new Date(r.at); if(!isNaN(d)) return fmtKDateTime(d); }
  return '-';
}
function loadApplicants(){
  const stored=rawList();
  rawApplicants=stored;
  applicants=stored.map((r,i)=>({
    id:r.id||null, nm:r.name||'(이름없음)', ini:(r.name||'?').slice(0,1),
    tel:maskTel(r.tel||''), topic:r.topic||'-', message:r.message||'',
    datesText:r.datesText||(Array.isArray(r.dates)?r.dates.join(', '):'')||'-',
    timesText:r.timesText||(Array.isArray(r.times)?r.times.join(', '):'')||'-',
    ag:r.agree?1:0, st:r.status||'wait', at:atTextOf(r), c:AV_COLORS[i%AV_COLORS.length]
  }));
}
function computeStats(){
  const total=applicants.length;
  const win=applicants.filter(a=>a.st==='win').length;
  const msg=applicants.filter(a=>a.message && a.message.trim()).length;
  const topicMap={};
  applicants.forEach(a=>{ const t=(a.topic||'-').trim(); if(t && t!=='-') topicMap[t]=(topicMap[t]||0)+1; });
  const topicPref=Object.keys(topicMap).map(t=>({t,v:topicMap[t]})).sort((a,b)=>b.v-a.v);
  return {total, win, msg, topicPref};
}

function renderAdmin(){
  loadApplicants();
  const st=computeStats();
  document.getElementById('kpiTotal').textContent=st.total;
  document.getElementById('kpiWin').textContent=st.win;
  document.getElementById('kpiRate').textContent = st.win>0 ? (st.total/st.win).toFixed(1) : '–';
  document.getElementById('kpiMsg').textContent=st.msg;
  document.getElementById('admSub').textContent = usingFirebase ? '실시간 동기화 중 · 방금 업데이트' : '로컬 저장소 기준 · 같은 브라우저';

  const tEl=document.getElementById('admTopic');
  if(st.topicPref.length){
    const maxT=Math.max(...st.topicPref.map(x=>x.v));
    tEl.innerHTML=st.topicPref.map(x=>`
      <div class="hbar"><span class="hl">${x.t}</span><div class="htrack"><div class="hfill" style="width:${Math.max(6,Math.round(x.v/maxT*100))}%"></div></div><span class="hv">${x.v}</span></div>`).join('');
  }else{
    tEl.innerHTML=`<div class="empty-msg">아직 신청 데이터가 없어요</div>`;
  }
  drawTable();
}
function esc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function drawTable(){
  let rows=`<div class="trow thd"><span>신청자</span><span>연락처</span><span>스트레스 유형</span><span style="text-align:center">동의</span><span style="text-align:right">상태</span></div>`;
  const list=applicants.filter(a=>admFilter==='all'||a.st===admFilter);
  if(list.length===0){
    rows+=`<div class="empty-row">아직 신청자가 없어요.<br>사용자 페이지에서 ‘신청 완료하기’를 하면 여기에 표시돼요.</div>`;
  }else{
    list.forEach(a=>{
      rows+=`<div class="trow">
        <span class="who"><span class="av" style="background:${a.c}">${esc(a.ini.slice(0,1))}</span><span class="nm">${esc(a.nm)}</span></span>
        <span class="tel">${esc(a.tel)}</span>
        <span><span class="topic">${esc(a.topic)}</span></span>
        <span class="agree${a.ag?'':' no'}">${a.ag?'✓':'—'}</span>
        <span class="tag ${a.st}">${a.st==='win'?'당첨':'대기'}</span>
        <div class="schedrow">📅 희망 날짜 — ${esc(a.datesText||'-')} &nbsp;·&nbsp; ⏰ ${esc(a.timesText||'-')}</div>
        <div class="timerow">🕒 신청 일시 — ${esc(a.at||'-')}</div>
        ${a.message&&a.message.trim()?`<div class="msgrow"><b>💬 남긴 말씀</b> — ${esc(a.message)}</div>`:''}
      </div>`;
    });
  }
  document.getElementById('admTbl').innerHTML=rows;
}
function filterAdm(f,btn){admFilter=f;document.querySelectorAll('.filters .fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');drawTable();}
function refreshAdmin(){ renderAdmin(); toast('🌊 신청 현황을 새로고침했어요'); }

/* Excel(.xlsx) 내보내기 — SheetJS 사용, 실패 시 CSV로 대체 */
function exportExcel(){
  const stored=rawList();
  if(!stored || stored.length===0){ toast('내보낼 신청자가 없어요'); return; }
  const head=['번호','이름','연락처','해소하고 싶은 스트레스','희망 날짜','희망 시간대','남긴 말씀','동의','상태','신청 일시'];
  const rows=stored.map((r,i)=>[
    i+1, r.name||'', r.tel||'', r.topic||'',
    r.datesText||(Array.isArray(r.dates)?r.dates.join(', '):'')||'',
    r.timesText||(Array.isArray(r.times)?r.times.join(', '):'')||'',
    (r.message||'').replace(/\n/g,' '),
    r.agree?'동의':'미동의', (r.status==='win'?'당첨':'대기'), atTextOf(r)
  ]);
  if(window.XLSX){
    try{
      const aoa=[head].concat(rows);
      const ws=XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols']=[{wch:6},{wch:12},{wch:16},{wch:18},{wch:22},{wch:22},{wch:32},{wch:8},{wch:8},{wch:28}];
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Stress OUT 신청자');
      const today=new Date(); const ymd=`${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
      XLSX.writeFile(wb, `StressOUT_신청자_${ymd}.xlsx`);
      toast('🌊 엑셀 파일로 내보냈어요');
      return;
    }catch(e){ console.warn('xlsx 내보내기 실패 — CSV로 대체', e); }
  }
  // SheetJS 미로딩 시 CSV 폴백
  const csv=[head].concat(rows).map(line=>line.map(c=>{
    const s=(''+c).replace(/"/g,'""'); return /[",\n]/.test(s)?`"${s}"`:s;
  }).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='StressOUT_신청자.csv';
  document.body.appendChild(a); a.click(); a.remove();
  toast('🌊 CSV로 내보냈어요 (엑셀에서 열 수 있어요)');
}

/* 추첨 — 동의한 신청자 중 정원만큼 무작위 당첨 */
const DRAW_QUOTA=20;
function runDraw(){
  const stored=rawList();
  if(!stored || stored.length===0){ toast('추첨할 신청자가 없어요'); return; }
  const eligible=stored.filter(r=>r.agree);
  for(let i=eligible.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [eligible[i],eligible[j]]=[eligible[j],eligible[i]]; }
  const winners=new Set(eligible.slice(0,DRAW_QUOTA));
  if(usingFirebase && window.fbUpdateStatus){
    stored.forEach(r=>{ if(r.id) window.fbUpdateStatus(r.id, winners.has(r)?'win':'wait'); });
    toast(`✨ 추첨 완료 — ${Math.min(DRAW_QUOTA,winners.size)}명 당첨`);
  }else{
    stored.forEach(r=>{ r.status = winners.has(r) ? 'win' : 'wait'; });
    try{ localStorage.setItem(APPLY_STORE_KEY, JSON.stringify(stored)); }catch(e){}
    renderAdmin();
    toast(`✨ 추첨 완료 — ${Math.min(DRAW_QUOTA,winners.size)}명 당첨`);
  }
}

window.onApplicantsUpdate=function(list){
  const onAdmin=document.querySelector('.admin.active');
  if(onAdmin) renderAdmin();
};

/* ---------- toast ---------- */
let tt;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(tt);tt=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},2600);}

/* ---------- boot ---------- */
go(isAdminAuthed ? 'admin' : 'adminlogin');
